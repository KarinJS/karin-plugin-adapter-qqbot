name: Release and Publish

on:
  push:
    branches: [main]
    tags: ['!**']

# release-please 需要 contents:write + pull-requests:write
# npm trusted publishing 需要 id-token:write
permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - name: Run release-please
        uses: googleapis/release-please-action@v4
        id: release
        with:
          release-type: node

      - name: Checkout
        if: ${{ steps.release.outputs.release_created }}
        uses: actions/checkout@v4

      - name: Setup pnpm
        if: ${{ steps.release.outputs.release_created }}
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        if: ${{ steps.release.outputs.release_created }}
        uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: 'https://registry.npmjs.org'
          cache: pnpm

      - name: Install dependencies
        if: ${{ steps.release.outputs.release_created }}
        run: pnpm install --frozen-lockfile

      - name: Build
        if: ${{ steps.release.outputs.release_created }}
        run: pnpm run build

      # 使用 npm trusted publishing（OIDC）
      # 需要在 npm 包后台启用：Settings → Trusted publishers
      # provider: GitHub Actions / repo: KarinJS/karin-plugin-adapter-qqbot /
      # workflow: .github/workflows/release.yml / environment: 留空
      - name: Publish to npm (trusted)
        if: ${{ steps.release.outputs.release_created }}
        run: npm publish --provenance --access public
