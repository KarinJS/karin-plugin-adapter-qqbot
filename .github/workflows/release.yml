name: Release and Publish
on:
  push:
    # 监听 main 分支的 push 事件
    branches:
      - main
    # 避免在 tag 上重复运行
    tags:
      - '!**'

# 赋予 release-please-action 权限
permissions:
  contents: write
  pull-requests: write

jobs:
  # pkg.pr.new 发布预览版
  # 每次推送到 main 分支时触发，无需发布到 NPM
  preview:
    runs-on: ubuntu-latest
    steps:
      # 检出代码（需要完整历史以正确获取提交信息）
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 设置 Node.js 环境
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      # 安装依赖
      - run: npm install

      # 构建输出
      - run: npm run build

      # 使用 pkg.pr.new 发布预览版
      # 注意：需要先在 https://github.com/apps/pkg-pr-new 安装 GitHub App
      - run: npx pkg-pr-new publish --json output.json
        id: publish

      # 生成工作流摘要，显示安装命令和提交信息
      - name: 生成工作流摘要
        shell: bash
        env:
          COMMIT_MSG: ${{ github.event.head_commit.message }}
          COMMIT_AUTHOR: ${{ github.event.head_commit.author.name }}
        run: |
          # 读取 pkg.pr.new 的 JSON 输出
          URLS=$(cat output.json | jq -r '.urls')
          SHA=$(cat output.json | jq -r '.sha')

          # 判断是否为 PR merge（通过检查提交消息是否以 "Merge pull request" 开头）
          PR_NUM=$(echo "$COMMIT_MSG" | sed -n 's/Merge pull request #\([0-9]*\).*/\1/p')
          if [ -n "$PR_NUM" ]; then
            COMMIT_TYPE="PR Merge (#${PR_NUM})"
          else
            COMMIT_TYPE="直接提交"
          fi

          # 写入 GitHub Actions 摘要
          {
            echo "## 📦 预览版已发布"
            echo ""
            echo "### 提交信息"
            echo ""
            echo "| 项目 | 值 |"
            echo "|------|-----|"
            echo "| **类型** | ${COMMIT_TYPE} |"
            echo "| **提交信息** | ${COMMIT_MSG} |"
            echo "| **提交者** | ${COMMIT_AUTHOR} |"
            echo "| **完整 SHA** | \`${{ github.sha }}\` |"
            echo "| **短 SHA** | \`${SHA}\` |"
            echo "| **分支** | \`${{ github.ref_name }}\` |"
            echo ""
            echo "### 安装命令"
            echo ""
            for url in $URLS; do
              echo "\`\`\`bash"
              echo "pnpm add $url -w"
              echo "\`\`\`"
              echo ""
            done
            echo "### 所有包 URL"
            echo ""
            echo "\`\`\`"
            for url in $URLS; do
              echo "$url"
            done
            echo "\`\`\`"
          } >> $GITHUB_STEP_SUMMARY

  # 设置 release-please 任务（正式发布到 NPM）
  release-please:
    # 设置任务运行环境为 ubuntu-latest
    runs-on: ubuntu-latest
    steps:
      # 使用 release-please-action 动作来自动创建发布 PR
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          # 设置发布类型为 node
          release-type: node
      # 检出代码
      - uses: actions/checkout@v4
        if: ${{ steps.release.outputs.release_created }}
      # 设置 Node.js 环境
      - uses: actions/setup-node@v4
        with:
          # 设置 Node.js 版本
          node-version: 20
          # 设置 npm 源
          registry-url: 'https://registry.npmjs.org'
      # 安装依赖
      - run: npm install
        env:
          NODE_AUTH_TOKEN: ${{ secrets.RELEASE }}
        if: ${{ steps.release.outputs.release_created }}
      # 构建输出
      - run: npm run build
        if: ${{ steps.release.outputs.release_created }}
      # 发布到 npm
      - run: npm run pub
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        if: ${{ steps.release.outputs.release_created }}
