name: Release and Publish

on:
  push:
    branches: [main]
    tags: ['!**']
  workflow_dispatch:

jobs:
  release-please:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
    steps:
      - name: Run release-please
        uses: googleapis/release-please-action@v5
        id: release
        with:
          config-file: .release-please-config.json
          manifest-file: .release-please-manifest.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish:
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: 'https://registry.npmjs.org'
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm run build

      - name: Upgrade npm
        run: npm install -g npm@latest

      # 使用 npm trusted publishing（OIDC）
      # 需要在 npm 包后台启用：Settings → Trusted publishers
      # provider: GitHub Actions / repo: KarinJS/karin-plugin-adapter-qqbot /
      # workflow: .github/workflows/release.yml / environment: 留空
      - name: Publish to npm (trusted)
        run: npm publish --provenance --access public
